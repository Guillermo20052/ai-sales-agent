<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conversations - AI Sales Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
    
  </head>
  <body>
    <nav class="topbar">
      <div class="topbar-brand">
        <div class="topbar-logo">AI</div>
        <div>
          <div class="topbar-title">AI Sales Agent</div>
          <div class="topbar-subtitle">Dashboard</div>
        </div>
      </div>
      <div class="topbar-right">
        <a href="/dashboard" class="topbar-nav-link">Leads</a>
        <a href="/dashboard/training" class="topbar-nav-link">AI Training</a>
        <a href="/dashboard/conversations" class="topbar-nav-link active">Conversations</a>
        <a href="/dashboard/install" class="topbar-nav-link">Install</a>
        <div class="topbar-status {{statusClass}}">
          <span class="status-dot"></span>
          <span>{{statusText}}</span>
        </div>
        <a href="/logout" class="topbar-nav-link muted">Logout</a>
      </div>
    </nav>

    <main class="main-container">
      <div class="page-header">
        <h1>Conversations</h1>
        <p class="page-header-sub">Recent AI conversations with your visitors</p>
      </div>

      <div class="conv-list" id="convList"></div>
    </main>

    <div class="conv-detail" id="convDetail" onclick="if(event.target===this)closeDetail()">
      <div class="conv-detail-inner">
        <div class="conv-detail-header">
          <h2 id="detailTitle">Conversation</h2>
          <button class="btn-close" onclick="closeDetail()">&#10005;</button>
        </div>
        <div class="conv-messages" id="detailMessages">
          <div class="loading-detail"><div class="spinner"></div><br>Loading messages...</div>
        </div>
      </div>
    </div>

    <script>
      var conversations = {{conversationsJson}};

      function renderList() {
        var container = document.getElementById('convList');

        if (!conversations || conversations.length === 0) {
          container.innerHTML = '<div class="empty-state"><div class="empty-icon">&#128172;</div><h3>No conversations yet</h3><p>Conversations will appear here when visitors chat with your AI agent.</p></div>';
          return;
        }

        var html = '';
        conversations.forEach(function(c) {
          var date = new Date(c.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
          var preview = c.first_message || 'No messages';
          if (preview.length > 120) preview = preview.substring(0, 120) + '...';

          html += '<div class="conv-card" onclick="openDetail(' + c.id + ')">';
          html += '<div class="conv-card-top">';
          html += '<span class="conv-id">Conversation #' + c.id + '</span>';
          html += '<span class="conv-date">' + date + '</span>';
          html += '</div>';
          html += '<div class="conv-preview">' + escapeHtml(preview) + '</div>';
          html += '<div class="conv-meta">';
          html += '<span class="conv-meta-item">&#128172; ' + c.message_count + ' messages</span>';
          if (c.visitor_id) html += '<span class="conv-meta-item">&#128100; ' + c.visitor_id.substring(0, 8) + '</span>';
          html += '</div>';
          html += '</div>';
        });

        container.innerHTML = html;
      }

      async function openDetail(convId) {
        var modal = document.getElementById('convDetail');
        modal.classList.add('show');
        document.getElementById('detailTitle').textContent = 'Conversation #' + convId;
        document.getElementById('detailMessages').innerHTML = '<div class="loading-detail"><div class="spinner"></div><br>Loading messages...</div>';

        try {
          var res = await fetch('/dashboard/conversations/' + convId);
          var data = await res.json();

          if (data.error) {
            document.getElementById('detailMessages').innerHTML = '<div class="loading-detail">Error: ' + data.error + '</div>';
            return;
          }

          var msgs = data.messages || [];
          var html = '';
          msgs.forEach(function(m) {
            var time = new Date(m.created_at).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            html += '<div class="msg ' + m.sender + '">';
            html += escapeHtml(m.content);
            html += '<div class="msg-time">' + (m.sender === 'user' ? 'Visitor' : 'AI') + ' &middot; ' + time + '</div>';
            html += '</div>';
          });

          if (!msgs.length) {
            html = '<div class="loading-detail">No messages in this conversation.</div>';
          }

          document.getElementById('detailMessages').innerHTML = html;
        } catch (err) {
          document.getElementById('detailMessages').innerHTML = '<div class="loading-detail">Failed to load conversation.</div>';
        }
      }

      function closeDetail() {
        document.getElementById('convDetail').classList.remove('show');
      }

      function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      renderList();
    </script>
  <script src="/site-agent.js"></script>
  </body>
</html>
