<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conversations - AI Sales Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0f1117;
        color: #e1e4e8;
        min-height: 100vh;
      }

      .topbar {
        background: rgba(15, 17, 23, 0.8);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        padding: 0 32px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .topbar-brand { display: flex; align-items: center; gap: 12px; }

      .topbar-logo {
        width: 36px; height: 36px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        border-radius: 10px; display: flex; align-items: center; justify-content: center;
        font-size: 18px; font-weight: 700; color: white;
      }

      .topbar-title { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
      .topbar-subtitle { font-size: 12px; color: rgba(255, 255, 255, 0.4); font-weight: 500; }
      .topbar-right { display: flex; align-items: center; gap: 12px; }

      .topbar-nav-link {
        padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
        color: rgba(255, 255, 255, 0.5); text-decoration: none; transition: all 0.2s;
      }

      .topbar-nav-link:hover, .topbar-nav-link.active { color: #fff; background: rgba(255, 255, 255, 0.06); }

      .topbar-status {
        display: flex; align-items: center; gap: 8px; padding: 6px 14px;
        border-radius: 100px; font-size: 13px; font-weight: 600;
      }

      .topbar-status.active { background: rgba(16, 185, 129, 0.12); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.2); }
      .topbar-status.inactive { background: rgba(239, 68, 68, 0.12); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }

      .status-dot { width: 8px; height: 8px; border-radius: 50%; }
      .active .status-dot { background: #34d399; box-shadow: 0 0 8px rgba(52, 211, 153, 0.5); }

      .main-container { max-width: 1100px; margin: 0 auto; padding: 40px 24px 80px; }

      .page-header { margin-bottom: 32px; }
      .page-header h1 { font-size: 28px; font-weight: 800; color: #fff; letter-spacing: -0.5px; margin-bottom: 6px; }
      .page-header-sub { font-size: 14px; color: rgba(255, 255, 255, 0.4); }

      .conv-list { display: flex; flex-direction: column; gap: 12px; }

      .conv-card {
        background: #161822;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 14px;
        padding: 20px 24px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .conv-card:hover {
        border-color: rgba(99, 102, 241, 0.3);
        background: #1a1d2e;
      }

      .conv-card-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
      }

      .conv-id {
        font-size: 13px;
        font-weight: 600;
        color: #818cf8;
      }

      .conv-date {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.3);
      }

      .conv-preview {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.6);
        line-height: 1.5;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .conv-meta {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-top: 8px;
      }

      .conv-meta-item {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.3);
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .conv-detail {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(8px);
        z-index: 200;
        justify-content: center;
        align-items: center;
        padding: 24px;
      }

      .conv-detail.show { display: flex; }

      .conv-detail-inner {
        background: #161822;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        max-width: 640px;
        width: 100%;
        max-height: 80vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .conv-detail-header {
        padding: 20px 24px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .conv-detail-header h2 {
        font-size: 17px;
        font-weight: 700;
        color: #fff;
      }

      .btn-close {
        width: 36px; height: 36px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.06);
        border: none;
        color: rgba(255, 255, 255, 0.5);
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
      }

      .btn-close:hover { background: rgba(255, 255, 255, 0.1); color: #fff; }

      .conv-messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px 24px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .msg {
        max-width: 85%;
        padding: 12px 16px;
        border-radius: 14px;
        font-size: 14px;
        line-height: 1.6;
      }

      .msg.user {
        align-self: flex-end;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: #fff;
        border-bottom-right-radius: 4px;
      }

      .msg.ai {
        align-self: flex-start;
        background: rgba(255, 255, 255, 0.06);
        color: #e1e4e8;
        border-bottom-left-radius: 4px;
      }

      .msg-time {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.3);
        margin-top: 4px;
      }

      .msg.user .msg-time { text-align: right; }

      .empty-state {
        text-align: center;
        padding: 80px 24px;
        color: rgba(255, 255, 255, 0.3);
      }

      .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
      .empty-state h3 { font-size: 16px; font-weight: 600; color: rgba(255, 255, 255, 0.5); margin-bottom: 6px; }
      .empty-state p { font-size: 14px; }

      .loading-detail {
        text-align: center;
        padding: 40px;
        color: rgba(255, 255, 255, 0.4);
        font-size: 14px;
      }

      .spinner {
        width: 20px; height: 20px;
        border: 2px solid rgba(255, 255, 255, 0.1);
        border-top-color: #818cf8;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        display: inline-block;
        margin-bottom: 8px;
      }

      @keyframes spin { to { transform: rotate(360deg); } }

      @media (max-width: 768px) {
        .main-container { padding: 24px 16px 60px; }
        .topbar { padding: 0 16px; }
        .page-header h1 { font-size: 22px; }
        .topbar-right { gap: 6px; }
        .topbar-nav-link { padding: 6px 10px; font-size: 12px; }
        .conv-detail-inner { max-height: 90vh; border-radius: 16px; }
      }
    </style>
  </head>
  <body>
    <nav class="topbar">
      <div class="topbar-brand">
        <div class="topbar-logo">AI</div>
        <div>
          <div class="topbar-title">AI Sales Agent</div>
          <div class="topbar-subtitle">Dashboard</div>
        </div>
      </div>
      <div class="topbar-right">
        <a href="/dashboard" class="topbar-nav-link">Leads</a>
        <a href="/dashboard/training" class="topbar-nav-link">AI Training</a>
        <a href="/dashboard/conversations" class="topbar-nav-link active">Conversations</a>
        <a href="/dashboard/install" class="topbar-nav-link">Install</a>
        <div class="topbar-status {{statusClass}}">
          <span class="status-dot"></span>
          <span>{{statusText}}</span>
        </div>
        <a href="/logout" class="topbar-nav-link" style="color:rgba(255,255,255,0.4);">Logout</a>
      </div>
    </nav>

    <main class="main-container">
      <div class="page-header">
        <h1>Conversations</h1>
        <p class="page-header-sub">Recent AI conversations with your visitors</p>
      </div>

      <div class="conv-list" id="convList"></div>
    </main>

    <div class="conv-detail" id="convDetail" onclick="if(event.target===this)closeDetail()">
      <div class="conv-detail-inner">
        <div class="conv-detail-header">
          <h2 id="detailTitle">Conversation</h2>
          <button class="btn-close" onclick="closeDetail()">&#10005;</button>
        </div>
        <div class="conv-messages" id="detailMessages">
          <div class="loading-detail"><div class="spinner"></div><br>Loading messages...</div>
        </div>
      </div>
    </div>

    <script>
      var conversations = {{conversationsJson}};

      function renderList() {
        var container = document.getElementById('convList');

        if (!conversations || conversations.length === 0) {
          container.innerHTML = '<div class="empty-state"><div class="empty-icon">&#128172;</div><h3>No conversations yet</h3><p>Conversations will appear here when visitors chat with your AI agent.</p></div>';
          return;
        }

        var html = '';
        conversations.forEach(function(c) {
          var date = new Date(c.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
          var preview = c.first_message || 'No messages';
          if (preview.length > 120) preview = preview.substring(0, 120) + '...';

          html += '<div class="conv-card" onclick="openDetail(' + c.id + ')">';
          html += '<div class="conv-card-top">';
          html += '<span class="conv-id">Conversation #' + c.id + '</span>';
          html += '<span class="conv-date">' + date + '</span>';
          html += '</div>';
          html += '<div class="conv-preview">' + escapeHtml(preview) + '</div>';
          html += '<div class="conv-meta">';
          html += '<span class="conv-meta-item">&#128172; ' + c.message_count + ' messages</span>';
          if (c.visitor_id) html += '<span class="conv-meta-item">&#128100; ' + c.visitor_id.substring(0, 8) + '</span>';
          html += '</div>';
          html += '</div>';
        });

        container.innerHTML = html;
      }

      async function openDetail(convId) {
        var modal = document.getElementById('convDetail');
        modal.classList.add('show');
        document.getElementById('detailTitle').textContent = 'Conversation #' + convId;
        document.getElementById('detailMessages').innerHTML = '<div class="loading-detail"><div class="spinner"></div><br>Loading messages...</div>';

        try {
          var res = await fetch('/dashboard/conversations/' + convId);
          var data = await res.json();

          if (data.error) {
            document.getElementById('detailMessages').innerHTML = '<div class="loading-detail">Error: ' + data.error + '</div>';
            return;
          }

          var msgs = data.messages || [];
          var html = '';
          msgs.forEach(function(m) {
            var time = new Date(m.created_at).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            html += '<div class="msg ' + m.sender + '">';
            html += escapeHtml(m.content);
            html += '<div class="msg-time">' + (m.sender === 'user' ? 'Visitor' : 'AI') + ' &middot; ' + time + '</div>';
            html += '</div>';
          });

          if (!msgs.length) {
            html = '<div class="loading-detail">No messages in this conversation.</div>';
          }

          document.getElementById('detailMessages').innerHTML = html;
        } catch (err) {
          document.getElementById('detailMessages').innerHTML = '<div class="loading-detail">Failed to load conversation.</div>';
        }
      }

      function closeDetail() {
        document.getElementById('convDetail').classList.remove('show');
      }

      function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      renderList();
    </script>
  </body>
</html>
