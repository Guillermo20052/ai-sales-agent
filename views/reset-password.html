<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - AI Sales Agent</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    
  </head>
  <body class="reset-page">
    <div class="login-wrapper">
    <div class="card">
      <h1>Reset Your Password</h1>
      <p>Enter your new password below.</p>

      <form id="resetForm">
        <div class="form-group">
          <input
            class="form-input"
            type="password"
            id="password"
            placeholder="New password"
            required
          />
        </div>

        <button type="submit" id="resetBtn" class="btn btn-primary">Reset Password</button>
      </form>

      <div id="message" class="message"></div>
    </div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");

      if (!token) {
        window.location.href = "/login.html";
      }

      document
        .getElementById("resetForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const btn = document.getElementById("resetBtn");
          const message = document.getElementById("message");
          message.style.display = "none";

          btn.disabled = true;
          btn.textContent = "Resetting...";

          try {
            const res = await fetch("/password/reset", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Accept: "application/json",
              },
              body: JSON.stringify({
                token,
                password: document.getElementById("password").value,
              }),
            });

            const contentType = res.headers.get("content-type");
            let data = {};
            if (contentType && contentType.includes("application/json")) {
              data = await res.json();
            } else {
              const text = await res.text();
              data = { error: res.ok ? null : text || "Reset failed." };
            }

            if (res.ok && data.success) {
              message.className = "message success";
              message.textContent =
                "Password successfully updated! Redirecting to login...";
              message.style.display = "block";

              setTimeout(() => {
                window.location.href = "/login.html";
              }, 2000);
            } else {
              message.className = "message error";
              message.textContent =
                (data && data.error) || "Reset failed. Try again or request a new link.";
              message.style.display = "block";
              btn.disabled = false;
              btn.textContent = "Reset Password";
            }
          } catch (err) {
            message.className = "message error";
            message.textContent = "Server error.";
            message.style.display = "block";
            btn.disabled = false;
            btn.textContent = "Reset Password";
          }
        });
    </script>
  <script src="/site-agent.js"></script>
  </body>
</html>
