<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - AI Sales Agent</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", sans-serif;
        background: #0f1117;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        color: #fff;
      }
      .card {
        background: #161822;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 20px;
        padding: 40px;
        width: 100%;
        max-width: 420px;
      }
      h1 {
        font-size: 22px;
        font-weight: 800;
        margin-bottom: 8px;
      }
      p {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.5);
        margin-bottom: 24px;
      }
      .form-group {
        margin-bottom: 16px;
      }
      input {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.05);
        color: #fff;
        font-size: 14px;
        outline: none;
      }
      input:focus {
        border-color: #6366f1;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
      }
      button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        font-weight: 700;
        font-size: 14px;
        cursor: pointer;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: #fff;
        margin-top: 8px;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .message {
        margin-top: 16px;
        font-size: 13px;
        display: none;
      }
      .error {
        color: #f87171;
      }
      .success {
        color: #34d399;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Reset Your Password</h1>
      <p>Enter your new password below.</p>

      <form id="resetForm">
        <div class="form-group">
          <input
            type="password"
            id="password"
            placeholder="New password"
            required
          />
        </div>

        <button type="submit" id="resetBtn">Reset Password</button>
      </form>

      <div id="message" class="message"></div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");

      if (!token) {
        window.location.href = "/login.html";
      }

      document
        .getElementById("resetForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const btn = document.getElementById("resetBtn");
          const message = document.getElementById("message");
          message.style.display = "none";

          btn.disabled = true;
          btn.textContent = "Resetting...";

          try {
            const res = await fetch("/password/reset", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                token,
                password: document.getElementById("password").value,
              }),
            });

            const data = await res.json();

            if (data.success) {
              message.className = "message success";
              message.textContent =
                "Password successfully updated! Redirecting to login...";
              message.style.display = "block";

              setTimeout(() => {
                window.location.href = "/login.html";
              }, 2000);
            } else {
              message.className = "message error";
              message.textContent = data.error || "Reset failed.";
              message.style.display = "block";
              btn.disabled = false;
              btn.textContent = "Reset Password";
            }
          } catch (err) {
            message.className = "message error";
            message.textContent = "Server error.";
            message.style.display = "block";
            btn.disabled = false;
            btn.textContent = "Reset Password";
          }
        });
    </script>
  </body>
</html>
