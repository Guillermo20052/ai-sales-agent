<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Revenue - Admin Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  </head>
  <body>
    <div class="admin-layout">
      <aside class="admin-sidebar">
        <div class="admin-sidebar-header"><h1>Admin Portal</h1></div>
        <nav class="admin-sidebar-nav">
          <a href="/internal-admin-portal-93847"><span class="nav-icon">&#9673;</span> <span>Overview</span></a>
          <a href="/internal-admin-portal-93847/users"><span class="nav-icon">&#9823;</span> <span>Users</span></a>
          <a href="/internal-admin-portal-93847/revenue" class="active"><span class="nav-icon">&#36;</span> <span>Revenue</span></a>
          <a href="/internal-admin-portal-93847/refunds"><span class="nav-icon">&#8634;</span> <span>Refunds</span></a>
          <a href="/internal-admin-portal-93847/admin-logs"><span class="nav-icon">&#9776;</span> <span>Logs</span></a>
        </nav>
        <div class="admin-sidebar-footer"><a href="/logout"><span class="nav-icon">&#10132;</span> <span>Logout</span></a></div>
      </aside>

      <main class="admin-main">
      <div class="admin-metrics-grid">
        <div class="metric-card">
          <div class="metric-header">
            <span class="metric-label">Active Subscriptions</span>
            <span class="metric-icon">&#9889;</span>
          </div>
          <div class="metric-value">{{ACTIVE_SUBSCRIPTIONS}}</div>
        </div>
        <div class="metric-card">
          <div class="metric-header">
            <span class="metric-label">Monthly Recurring Revenue</span>
            <span class="metric-icon">&#8599;</span>
          </div>
          <div class="metric-value revenue">${{ESTIMATED_MRR}}</div>
        </div>
        <div class="metric-card">
          <div class="metric-header">
            <span class="metric-label">Lifetime Revenue</span>
            <span class="metric-icon">&#9670;</span>
          </div>
          <div class="metric-value revenue">${{LIFETIME_REVENUE}}</div>
        </div>
      </div>

      <div class="chart-card">
        <h3>Monthly Revenue</h3>
        <div class="chart-wrapper" style="height: 360px;">
          <canvas id="revenueChart"></canvas>
        </div>
      </div>
      </main>
    </div>

    <script>
    (function () {
      var BASE = "/internal-admin-portal-93847";

      async function loadRevenueChart() {
        try {
          var res = await fetch(BASE + "/revenue-chart");
          var data = await res.json();
          if (!res.ok) throw new Error(data.error || "Failed to load chart.");
          renderChart(data);
        } catch (err) {
          console.error("Revenue chart error:", err);
        }
      }

      function renderChart(data) {
        var labels = data.map(function (d) {
          var parts = d.month.split("-");
          var date = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1);
          return date.toLocaleDateString("en-US", { month: "short", year: "2-digit" });
        });
        var revenue = data.map(function (d) { return d.revenue; });
        var refunds = data.map(function (d) { return d.refunds; });

        var ctx = document.getElementById("revenueChart").getContext("2d");
        new Chart(ctx, {
          type: "bar",
          data: {
            labels: labels,
            datasets: [
              {
                label: "Revenue",
                data: revenue,
                backgroundColor: "rgba(255, 255, 255, 0.15)",
                borderColor: "rgba(255, 255, 255, 0.6)",
                borderWidth: 1,
                borderRadius: 4,
                order: 2
              },
              {
                label: "Refunds",
                data: refunds,
                backgroundColor: "rgba(251, 191, 36, 0.25)",
                borderColor: "rgba(251, 191, 36, 0.6)",
                borderWidth: 1,
                borderRadius: 4,
                order: 1
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { intersect: false, mode: "index" },
            plugins: {
              legend: {
                display: true, position: "top", align: "end",
                labels: { color: "rgba(255,255,255,0.5)", font: { family: "'Inter', sans-serif", size: 12 }, boxWidth: 12, padding: 16 }
              },
              tooltip: {
                backgroundColor: "#18181b", titleColor: "#fafafa", bodyColor: "#a1a1aa",
                borderColor: "rgba(255,255,255,0.08)", borderWidth: 1, padding: 12,
                bodyFont: { family: "'Inter', sans-serif" },
                callbacks: { label: function (c) { return c.dataset.label + ": $" + c.parsed.y.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 }); } }
              }
            },
            scales: {
              x: { grid: { color: "rgba(255,255,255,0.04)" }, ticks: { color: "rgba(255,255,255,0.4)", font: { family: "'Inter', sans-serif", size: 11 } } },
              y: { grid: { color: "rgba(255,255,255,0.04)" }, ticks: { color: "rgba(255,255,255,0.4)", font: { family: "'Inter', sans-serif", size: 11 }, callback: function (v) { return "$" + v.toLocaleString(); } } }
            }
          }
        });
      }

      loadRevenueChart();
    })();
    </script>
  </body>
</html>
