<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Refunds - Admin Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="admin-layout">
      <aside class="admin-sidebar">
        <div class="admin-sidebar-header"><h1>Admin Portal</h1></div>
        <nav class="admin-sidebar-nav">
          <a href="/internal-admin-portal-93847"><span class="nav-icon">&#9673;</span> <span>Overview</span></a>
          <a href="/internal-admin-portal-93847/users"><span class="nav-icon">&#9823;</span> <span>Users</span></a>
          <a href="/internal-admin-portal-93847/revenue"><span class="nav-icon">&#36;</span> <span>Revenue</span></a>
          <a href="/internal-admin-portal-93847/refunds" class="active"><span class="nav-icon">&#8634;</span> <span>Refunds</span></a>
          <a href="/internal-admin-portal-93847/admin-logs"><span class="nav-icon">&#9776;</span> <span>Logs</span></a>
        </nav>
        <div class="admin-sidebar-footer"><a href="/logout"><span class="nav-icon">&#10132;</span> <span>Logout</span></a></div>
      </aside>

      <main class="admin-main">
      <div class="admin-metrics-grid">
        <div class="metric-card">
          <div class="metric-header">
            <span class="metric-label">Total Refunds</span>
            <span class="metric-icon">&#8634;</span>
          </div>
          <div class="metric-value">{{REFUND_COUNT}}</div>
        </div>
        <div class="metric-card">
          <div class="metric-header">
            <span class="metric-label">Total Refunded</span>
            <span class="metric-icon">&#9888;</span>
          </div>
          <div class="metric-value">${{TOTAL_REFUNDED}}</div>
        </div>
      </div>

      <div class="admin-page-title">Refund History</div>
      <div class="admin-table-container">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Email</th>
              <th>Business</th>
              <th>Amount</th>
              <th>Reason</th>
              <th>Status</th>
              <th>Stripe ID</th>
            </tr>
          </thead>
          <tbody id="refundsTableBody">
            <tr class="empty-row"><td colspan="7">Loading refunds...</td></tr>
          </tbody>
        </table>
      </div>
      </main>
    </div>

    <script>
    (function () {
      var BASE = "/internal-admin-portal-93847";
      var tableBody = document.getElementById("refundsTableBody");

      function escapeHtml(text) {
        return String(text || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
      }

      async function loadRefunds() {
        try {
          var res = await fetch(BASE + "/api/refunds");
          var data = await res.json();
          if (!res.ok) throw new Error(data.error || "Failed to load refunds.");
          renderRefunds(data.refunds || []);
        } catch (err) {
          tableBody.innerHTML = '<tr class="empty-row"><td colspan="7">Error loading refunds.</td></tr>';
        }
      }

      function renderRefunds(refunds) {
        if (!refunds.length) {
          tableBody.innerHTML = '<tr class="empty-row"><td colspan="7">No refunds found.</td></tr>';
          return;
        }
        tableBody.innerHTML = refunds.map(function (r) {
          var date = new Date(r.created_at).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
          var amt = r.amount ? "$" + (r.amount / 100).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : "\u2014";
          var reason = escapeHtml(r.reason || "\u2014");
          if (reason === "admin_initiated") reason = "Admin";
          if (reason === "requested_by_customer") reason = "Customer";
          return '<tr>' +
            '<td>' + date + '</td>' +
            '<td>' + escapeHtml(r.email) + '</td>' +
            '<td>' + escapeHtml(r.business_name || "\u2014") + '</td>' +
            '<td>' + amt + '</td>' +
            '<td>' + reason + '</td>' +
            '<td><span class="status-pill status-' + escapeHtml(r.status) + '">' + escapeHtml(r.status) + '</span></td>' +
            '<td class="muted">' + escapeHtml(r.stripe_refund_id || "\u2014") + '</td>' +
            '</tr>';
        }).join("");
      }

      loadRefunds();
    })();
    </script>
  </body>
</html>
