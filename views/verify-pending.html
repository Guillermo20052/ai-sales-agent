<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify Your Email - AI Sales Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
    
  </head>
  <body>
    <div class="verify-wrapper">
      <div class="verify-card">
        <div class="verify-icon">&#9993;</div>
        <h1>Check Your Email</h1>
        <p>We sent a verification link to your email address. Click the link to verify your account and continue to payment.</p>
        <button class="btn-resend" id="resendBtn" onclick="resendEmail()">Resend Verification Email</button>
        <div class="status-msg" id="statusMsg"></div>
        <div class="login-link">
          <a href="/login.html">Back to Login</a>
        </div>
      </div>
    </div>

    <script>
      async function resendEmail() {
        const btn = document.getElementById("resendBtn");
        const statusEl = document.getElementById("statusMsg");
        btn.disabled = true;
        btn.textContent = "Sending...";
        statusEl.style.display = "none";

        try {
          const res = await fetch("/auth/resend-verification", { method: "POST", headers: { "Content-Type": "application/json" } });
          const data = await res.json();
          statusEl.className = res.ok ? "status-msg success" : "status-msg error";
          statusEl.textContent = data.message || data.error;
          statusEl.style.display = "block";
        } catch (err) {
          statusEl.className = "status-msg error";
          statusEl.textContent = "Connection error. Please try again.";
          statusEl.style.display = "block";
        }
        btn.disabled = false;
        btn.textContent = "Resend Verification Email";
      }
    </script>
  <script src="/site-agent.js"></script>
  </body>
</html>
