<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify Your Email - AI Sales Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0f1117;
        min-height: 100vh;
        display: flex; align-items: center; justify-content: center;
        padding: 24px;
      }
      .verify-wrapper { width: 100%; max-width: 480px; text-align: center; }
      .verify-card {
        background: #161822;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 20px;
        padding: 48px 40px;
      }
      .verify-icon {
        width: 72px; height: 72px; border-radius: 50%;
        background: rgba(99, 102, 241, 0.12);
        display: inline-flex; align-items: center; justify-content: center;
        font-size: 36px; margin-bottom: 28px;
      }
      h1 { font-size: 24px; font-weight: 800; color: #fff; margin-bottom: 12px; }
      p { font-size: 15px; color: rgba(255, 255, 255, 0.5); line-height: 1.7; margin-bottom: 32px; }
      .email-highlight { color: #a5b4fc; font-weight: 600; }
      .btn-resend {
        display: inline-block; padding: 12px 28px;
        background: rgba(255, 255, 255, 0.08);
        color: #fff; font-size: 14px; font-weight: 600;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px; cursor: pointer;
        font-family: 'Inter', sans-serif; transition: all 0.2s;
        text-decoration: none;
      }
      .btn-resend:hover { background: rgba(255, 255, 255, 0.12); }
      .btn-resend:disabled { opacity: 0.5; cursor: not-allowed; }
      .login-link {
        margin-top: 28px;
        font-size: 14px; color: rgba(255, 255, 255, 0.4);
      }
      .login-link a { color: #818cf8; text-decoration: none; font-weight: 600; }
      .login-link a:hover { text-decoration: underline; }
      .status-msg {
        padding: 10px 16px; border-radius: 10px;
        font-size: 13px; font-weight: 500; margin-top: 16px; display: none;
      }
      .status-msg.success { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); color: #34d399; }
      .status-msg.error { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #f87171; }
    </style>
  </head>
  <body>
    <div class="verify-wrapper">
      <div class="verify-card">
        <div class="verify-icon">&#9993;</div>
        <h1>Check Your Email</h1>
        <p>We sent a verification link to your email address. Click the link to verify your account and continue to payment.</p>
        <button class="btn-resend" id="resendBtn" onclick="resendEmail()">Resend Verification Email</button>
        <div class="status-msg" id="statusMsg"></div>
        <div class="login-link">
          <a href="/login.html">Back to Login</a>
        </div>
      </div>
    </div>

    <script>
      async function resendEmail() {
        const btn = document.getElementById("resendBtn");
        const statusEl = document.getElementById("statusMsg");
        btn.disabled = true;
        btn.textContent = "Sending...";
        statusEl.style.display = "none";

        try {
          const res = await fetch("/auth/resend-verification", { method: "POST", headers: { "Content-Type": "application/json" } });
          const data = await res.json();
          statusEl.className = res.ok ? "status-msg success" : "status-msg error";
          statusEl.textContent = data.message || data.error;
          statusEl.style.display = "block";
        } catch (err) {
          statusEl.className = "status-msg error";
          statusEl.textContent = "Connection error. Please try again.";
          statusEl.style.display = "block";
        }
        btn.disabled = false;
        btn.textContent = "Resend Verification Email";
      }
    </script>
  </body>
</html>
