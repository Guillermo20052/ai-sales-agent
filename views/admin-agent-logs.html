<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Logs - Admin Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="admin-layout">
      <aside class="admin-sidebar">
        <div class="admin-sidebar-header"><h1>Admin Portal</h1></div>
        <nav class="admin-sidebar-nav">
          <a href="/internal-admin-portal-93847"><span class="nav-icon">&#9673;</span> <span>Overview</span></a>
          <a href="/internal-admin-portal-93847/users"><span class="nav-icon">&#9823;</span> <span>Users</span></a>
          <a href="/internal-admin-portal-93847/revenue"><span class="nav-icon">&#36;</span> <span>Revenue</span></a>
          <a href="/internal-admin-portal-93847/refunds"><span class="nav-icon">&#8634;</span> <span>Refunds</span></a>
          <a href="/internal-admin-portal-93847/admin-logs"><span class="nav-icon">&#9776;</span> <span>Logs</span></a>
          <a href="/internal-admin-portal-93847/agent-logs" class="active"><span class="nav-icon">&#128172;</span> <span>Agent Logs</span></a>
        </nav>
        <div class="admin-sidebar-footer"><a href="/logout"><span class="nav-icon">&#10132;</span> <span>Logout</span></a></div>
      </aside>

      <main class="admin-main">
        <div class="admin-page-title">Agent Audit Logs</div>
        <form method="get" action="/internal-admin-portal-93847/agent-logs" class="admin-filters" style="display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px;align-items:flex-end;">
          <label>Business ID <input type="number" name="business_id" value="{{FILTER_BUSINESS_ID}}" placeholder="e.g. 1" min="1" style="width:90px;" /></label>
          <label>Conversation ID <input type="number" name="conversation_id" value="{{FILTER_CONVERSATION_ID}}" placeholder="e.g. 42" min="1" style="width:90px;" /></label>
          <label>Event type <input type="text" name="event_type" value="{{FILTER_EVENT_TYPE}}" placeholder="e.g. agent_response" style="width:140px;" /></label>
          <label>From <input type="date" name="date_from" value="{{FILTER_DATE_FROM}}" /></label>
          <label>To <input type="date" name="date_to" value="{{FILTER_DATE_TO}}" /></label>
          <button type="submit">Filter</button>
        </form>
        <div class="admin-table-container">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Timestamp</th>
                <th>Business ID</th>
                <th>Conversation ID</th>
                <th>Event type</th>
                <th>Outcome</th>
                <th>Details</th>
              </tr>
            </thead>
            <tbody>
              {{LOG_ROWS}}
            </tbody>
          </table>
        </div>
      </main>
    </div>
  </body>
</html>
