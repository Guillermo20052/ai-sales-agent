<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - AI Sales Agent</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    
  </head>
  <body class="forgot-page">
    <div class="login-wrapper">
    <div class="card">
      <h1>Forgot Password</h1>
      <p>Enter your email and we’ll send you a reset link.</p>

      <form id="forgotForm">
        <div class="form-group">
          <input class="form-input" type="email" id="email" placeholder="you@company.com" required />
        </div>
        <button type="submit" id="submitBtn" class="btn btn-primary">Send Reset Link</button>
      </form>

      <div id="message" class="message"></div>
    </div>
    </div>

    <script>
      document
        .getElementById("forgotForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const btn = document.getElementById("submitBtn");
          const message = document.getElementById("message");

          btn.disabled = true;
          btn.textContent = "Sending...";
          message.style.display = "none";

          try {
            const res = await fetch("/password/forgot", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                email: document.getElementById("email").value,
              }),
            });

            let data = {};
            try {
              data = await res.json();
            } catch (parseErr) {
              data = {};
            }

            if (!res.ok || data.success !== true) {
              message.className = "message error";
              message.textContent =
                "Something went wrong. Please try again in a moment.";
            } else {
              message.className = "message success";
              message.textContent =
                "If that email exists, a reset link has been sent.";
            }
            message.style.display = "block";
          } catch (err) {
            message.className = "message error";
            message.textContent =
              "Unable to contact the server. Please check your connection and try again.";
            message.style.display = "block";
          } finally {
            btn.textContent = "Send Reset Link";
            btn.disabled = false;
          }
        });
    </script>
  <script src="/site-agent.js"></script>
  </body>
</html>
