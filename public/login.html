<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - AI Sales Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    
  </head>
  <body class="login-page">
    <div class="login-wrapper">
      <div class="login-brand">
        <div class="login-logo">AI</div>
        <h1>Welcome Back</h1>
        <p>Sign in to your AI Sales Agent dashboard</p>
      </div>

      <div class="login-card">
        <div class="error-msg" id="errorMsg"></div>

        <form id="loginForm" autocomplete="on">
          <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <input
              class="form-input"
              type="email"
              id="email"
              placeholder="you@company.com"
              required
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input
              class="form-input"
              type="password"
              id="password"
              placeholder="Enter your password"
              required
            />
          </div>

          <div class="form-footer">
            <a href="/password/forgot" class="link">Forgot password?</a>
          </div>

          <button class="btn-login" type="submit" id="loginBtn">Sign In</button>
        </form>
      </div>

      <div class="auth-footer">
        Don't have an account?
        <a href="/signup" class="link">Sign up</a>
      </div>
    </div>

    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const btn = document.getElementById("loginBtn");
          const errorEl = document.getElementById("errorMsg");
          errorEl.style.display = "none";
          btn.disabled = true;
          btn.textContent = "Signing in...";

          try {
            const res = await fetch("/auth/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                email: document.getElementById("email").value,
                password: document.getElementById("password").value,
              }),
            });

            const data = await res.json();

            if (data.user) {
              window.location.href = data.redirect || "/dashboard";
            } else {
              errorEl.textContent =
                data.error || "Login failed. Please try again.";
              errorEl.style.display = "block";
              btn.disabled = false;
              btn.textContent = "Sign In";
            }
          } catch (err) {
            errorEl.textContent = "Connection error. Please try again.";
            errorEl.style.display = "block";
            btn.disabled = false;
            btn.textContent = "Sign In";
          }
        });
    </script>
  <script src="/site-agent.js"></script>
  </body>
</html>
