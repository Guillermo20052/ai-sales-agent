<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - AI Sales Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #0f1117;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .login-wrapper {
        width: 100%;
        max-width: 420px;
      }

      .login-brand {
        text-align: center;
        margin-bottom: 40px;
      }

      .login-logo {
        width: 52px;
        height: 52px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        border-radius: 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        font-weight: 800;
        color: white;
        margin-bottom: 20px;
        box-shadow: 0 8px 30px rgba(99, 102, 241, 0.3);
      }

      .login-brand h1 {
        font-size: 24px;
        font-weight: 800;
        color: #fff;
        letter-spacing: -0.5px;
        margin-bottom: 6px;
      }

      .login-brand p {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.4);
      }

      .login-card {
        background: #161822;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 20px;
        padding: 36px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.6);
        margin-bottom: 8px;
      }

      .form-input {
        width: 100%;
        padding: 12px 16px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        color: #fff;
        font-size: 14px;
        font-family: "Inter", sans-serif;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        outline: none;
      }

      .form-input::placeholder {
        color: rgba(255, 255, 255, 0.25);
      }

      .form-input:focus {
        border-color: #6366f1;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
      }

      .btn-login {
        width: 100%;
        padding: 13px 24px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: #fff;
        font-size: 14px;
        font-weight: 700;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-family: "Inter", sans-serif;
        transition: all 0.2s;
        margin-top: 8px;
      }

      .btn-login:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 25px rgba(99, 102, 241, 0.35);
      }

      .btn-login:active {
        transform: translateY(0);
      }

      .btn-login:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .error-msg {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.2);
        color: #f87171;
        padding: 12px 16px;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 500;
        margin-bottom: 20px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="login-wrapper">
      <div class="login-brand">
        <div class="login-logo">AI</div>
        <h1>Welcome Back</h1>
        <p>Sign in to your AI Sales Agent dashboard</p>
      </div>

      <div class="login-card">
        <div class="error-msg" id="errorMsg"></div>

        <form id="loginForm" autocomplete="on">
          <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <input
              class="form-input"
              type="email"
              id="email"
              placeholder="you@company.com"
              required
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input
              class="form-input"
              type="password"
              id="password"
              placeholder="Enter your password"
              required
            />
          </div>

          <div style="text-align: right; margin-bottom: 16px">
            <a
              href="/password/forgot"
              style="
                font-size: 13px;
                color: #818cf8;
                text-decoration: none;
                font-weight: 600;
              "
            >
              Forgot password?
            </a>
          </div>

          <button class="btn-login" type="submit" id="loginBtn">Sign In</button>
        </form>
      </div>

      <div
        style="
          text-align: center;
          margin-top: 24px;
          font-size: 14px;
          color: rgba(255, 255, 255, 0.4);
        "
      >
        Don't have an account?
        <a
          href="/signup"
          style="color: #818cf8; text-decoration: none; font-weight: 600"
          >Sign up</a
        >
      </div>
    </div>

    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const btn = document.getElementById("loginBtn");
          const errorEl = document.getElementById("errorMsg");
          errorEl.style.display = "none";
          btn.disabled = true;
          btn.textContent = "Signing in...";

          try {
            const res = await fetch("/auth/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                email: document.getElementById("email").value,
                password: document.getElementById("password").value,
              }),
            });

            const data = await res.json();

            if (data.user) {
              window.location.href = data.redirect || "/dashboard";
            } else {
              errorEl.textContent =
                data.error || "Login failed. Please try again.";
              errorEl.style.display = "block";
              btn.disabled = false;
              btn.textContent = "Sign In";
            }
          } catch (err) {
            errorEl.textContent = "Connection error. Please try again.";
            errorEl.style.display = "block";
            btn.disabled = false;
            btn.textContent = "Sign In";
          }
        });
    </script>
  </body>
</html>
